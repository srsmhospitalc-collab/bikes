<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Sort Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="logo">
            <div class="logo-ball ball-1"></div>
            <div class="logo-ball ball-2"></div>
            <div class="logo-ball ball-3"></div>
        </div>
        <h1>Ball Sort Master</h1>
        <p class="tagline">Sort the colors, Master the puzzle</p>
        <button id="play-btn" class="glow-btn">▶ PLAY NOW</button>
        <div class="stats-preview">
            <span>🏆 100 Levels</span>
            <span>🎯 Addictive</span>
        </div>
    </div>

    <!-- Level Select Screen -->
    <div id="level-screen" class="screen">
        <div class="screen-header">
            <button id="back-btn">←</button>
            <h2>Select Level</h2>
            <span id="unlocked-count">1/100</span>
        </div>
        <div id="levels-grid"></div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <button id="home-btn">🏠</button>
            <div class="level-info">
                <span>Level <span id="current-level">1</span></span>
                <span>Moves: <span id="moves">0</span></span>
            </div>
            <button id="restart-btn">🔄</button>
        </div>

        <div id="tubes-container"></div>

        <div class="game-controls">
            <button id="hint-btn" class="reward-btn">
                <span>💡 Hint</span>
                <small>Watch Ad</small>
            </button>
            <button id="extra-tube-btn" class="reward-btn">
                <span>➕ Tube</span>
                <small>Watch Ad</small>
            </button>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="ads.js"></script>
</body>
</html>
