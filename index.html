<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ball Sort Puzzle</title>
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
<script>
  try {
    window.TelegramAdsController = new TelegramAdsController();
    window.TelegramAdsController.initialize({
      pubId: "1013423",
      appId: "7744",
      debug: false
    });
  } catch(e) {console.log('Ads init error:', e)}
</script>
</head>
<body>
<div class="container">
    <div id="homeScreen" class="screen active">
        <h1>BALL SORT</h1>
        <p style="color:#666;margin-bottom:40px;text-align:center;font-size:16px">Sort Balls by Color</p>
        <div style="text-align:center">
            <button class="btn" onclick="showLevelSelect()">▶ PLAY</button>
        </div>
    </div>

    <div id="levelScreen" class="screen">
        <h2 style="margin-bottom:15px;text-align:center;color:#4a90e2">SELECT LEVEL</h2>
        <div class="level-grid" id="levelGrid"></div>
        <div style="text-align:center">
            <button class="btn" onclick="showHome()">⬅ BACK</button>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="game-header">
            <button class="icon-btn" onclick="showLevelSelect()">←</button>
            <div class="level-badge">Level <span id="levelNum">1</span></div>
            <button class="icon-btn" onclick="restartLevel()">🔄</button>
        </div>
        
        <div class="moves">Moves: <span id="moveCount">0</span></div>
        <div class="tubes-container" id="tubesContainer"></div>
        
        <div class="bottom-bar">
            <button class="circle-btn" onclick="undoMove()">↶</button>
            <button class="circle-btn hint-btn" onclick="addTube()">➕</button>
        </div>
    </div>
</div>
<script src="game.js"></script>
</body>
</html>
